# DayScope 配置文件
# 修改后需要重启服务：systemctl --user restart dayscope

# ============ 截图配置 ============
screenshot:
  interval_minutes: 1          # 截图频率（分钟）
  output_dir: ~/.dayscope/screenshots
  jpeg_quality: 70             # JPEG 质量（1-95）
  max_dimension: 1920          # 最长边缩放（像素，0=不缩放）
  retention_days: 7            # 原始截图保留天数（0=永不清）
  skip_unchanged: true         # 屏幕没变化时跳过截图（节省空间）
  unchanged_threshold: 0.98    # 相似度阈值（1.0=完全相同）

# ============ 隐私保护 ============
privacy:
  enabled: true
  # 窗口标题包含这些关键词时跳过截图
  blacklist:
    - "1Password"
    - "Bitwarden"
    - "KeePass"
    - "LastPass"
    - "银行"
    - "招商银行"
    - "工商银行"
    - "建设银行"
    - "支付宝"
    - "微信支付"
    - "Telegram"
    - "Signal"
    - "登录"
    - "Sign in"

# ============ AI 分析配置 ============
ai:
  enabled: true
  model: "minimax-cn/MiniMax-M3"        # minimax vision 模型
  hourly_run_at_minute: 50     # 每小时第几分钟跑分析（如 50 = HH:50）
  daily_run_at: "23:55"         # 每天几点几分生成日报
  max_images_per_call: 18      # 单次调用最多图数（describe-many 上限 20）
  timeout_seconds: 300          # 单次 AI 调用超时
  # 时报分析 prompt（核心思想：识别任务 → 归类 → 总结，而非逐图罗列）
  # 注：openclaw 的 describe-many 是每张图独立调用后由客户端合并，
  # 所以这个 prompt 是给单张图设计的，要求输出最简化 JSON 描述。
  prompt_hourly: |
    你是马帅（AI 高级算法主管、负责机器人导航算法）的工作分析师。这是他某一时刻（间隔约 1 分钟）的工作屏幕截图。

    ⚠️ **文件名 = 真实时间戳**，格式 `YYYYMMDD-HHMMSS.jpg`（如 `20260614-100113.jpg` = 2026-06-14 10:01:13）。**请依据文件名准确写时间**，不要估计、不要瞎编。

    你的任务是描述**这张截图背后的"任务"**，而不是描述 UI 元素：
    1. **当前应用**：VS Code / JetBrains / Vim / 终端 / Chrome / Slack / 微信 / 钉钉 / Zoom / 腾讯会议 / 其他
    2. **任务类型**：深度工作|调试|文档|沟通|会议|学习|碎片|**休息|挂机**
    3. **活动主题**：一句话总结在做什么（重点是"为什么做"，不是"屏幕上有什么"）。**动宾结构，5-12 个字**（例：'修复 DayScope 部署路径'，'梳理今日任务归纳方案'）。**休息/挂机时填 "电脑前休息" 或 "静心思考"**，不要脑补"在讨论问题"
    4. **关键内容**：代码语言/文件名/函数名、文档标题、聊天对象、网页主题（30 字内）。**不写"OpenClaw 控制台"这种笼统描述，写具体场景**（例：'与 AI 讨论 M3 模型配置'）。**休息/挂机时填 "未产生交互"**
    5. **产出信号**：是否产生了 commit/issue/PR/文档/决策/回复/无产出。**休息/挂机时填 "none"**

    上一小时上下文：{prev_summary}

    ⚠️ 必须**仅输出 JSON**，不要任何解释文字、Markdown 代码块标记、引号包裹：
    {"app":"应用名","category":"深度工作|调试|文档|沟通|会议|学习|碎片|休息|挂机","activity":"一句话任务主题（用动宾结构，如'修复 DayScope PATH bug'）","details":"关键内容（30字内）","outcome":"commit|issue|pr|doc|decision|reply|none"}

    ⚠️ **重要：识别"挂机"状态**（避免误判）**
    - **如果屏幕内容与上一张几乎一样**（没动、没输入、没切换应用），别脑补"在写代码"、"在讨论问题"
    - 看到 60 张图是同一个 OpenClaw 聊天页 → 应该是 1 个 event：category=挂机，activity="电脑前休息"，details="未产生交互"
    - **别输出 60 个"在讨论"**（AI 有时会给连续一样的图岀一堆"在讨论"描述，错误地认为在工作）

    ⚠️ **挂机识别提示**（需严格遵守）：
    - 如果看到的是**同一应用、同一画面、不同时间**，且**画面里没有输入动作**（没在打字、没点击、没切到其他应用），**默认为挂机**
    - 60 张 OpenClaw 聊天页不间断 = 60 个挂机（category="挂机"，activity="电脑前休息"）
    - **不需证明"他在工作"**，看不到动作就是挂机，**不要被 OpenClaw 聊天页的“文档 + 代码”细节误导**

  # 任务归纳 prompt（关键创新：把 60 个 events 归纳成 3-7 个任务）
  # 用 M3 文本模型跑，不看图，只看 events 列表做聚合
  prompt_aggregate_hourly: |
    你是马帅（AI 高级算法主管、负责机器人导航算法）的工作分析师。给你这个小时 60 个屏幕事件（每张截图一个事件，按时间排序）：

    {events_json}

    上一小时任务总结：{prev_tasks}

    你的任务：把这 60 个事件**归纳成 3-7 个“任务”**（不是逐事件描述）。

    ⚠️ 本小时是 **{hour} 点**。event.time 是“00:00”、“00:30”这种（只到分秒），你必须**手动把小时补成 {hour}**（如 event.time=“00:30” → 实际是“{hour}:30”）。**绝不能输出 00:xx 这种“个位数小时”**。

    任务定义：
    - 同一主题 / 同一项目 / 连续操作 = 一个任务
    - 例子：调路径问题 + 重启服务 + 验证 + commit = 1 个任务"修复部署问题"
    - 另例：阅读文档 + 写代码 + 调试 + 写 commit message = 1 个任务"开发某功能"

    ⚠️ **严格约束**：
    - **start/end 必须填**，从本任务包含的所有 event.time 推算，起=最早 event，止=最晚 event。**不允许为空或返回 “”**
    - **start/end 是几小时点（如 10:30），不是 00:30**。本小时是 {hour} 点，event.time 可能是“00:00”这种，你必须把小时位补成本小时的号（如“10:00”、“10:30”、“10:59”）
    - **任务标题必须 5-12 个字，动宾结构**（如“修复 DayScope 部署路径”），不要写“OpenClaw 控制台排查”这种取名
    - **details 不写 OpenClaw、跟 AI 对话**这种笼统描述，写**具体项目 / 文件 / 话题**（如“DayScope analyzer.py 任务归纳重构”）
    - outcomes 必须是 "commit" | "issue" | "pr" | "doc" | "decision" | "reply" | "none" 之一，可多个
    - **如果发现大量 "category=挂机" events（> 30%）**，**必须独立出一个任务 "电脑前休息/挂机"**，不要合成"梳理问题"这种虚假任务

    给每个任务：
    1. **标题**：动宾结构，5-10 个字（例：修复 DayScope 部署路径问题）
    2. **类型**：深度工作|调试|文档|沟通|会议|学习|碎片|休息
    3. **起止时间**：根据事件时间覆盖
    4. **详情**：是什么项目/什么文件/什么话题（30 字内）
    5. **产出**：本任务产生的具体成果（commit hash / issue 编号 / 文档名 / 决策 / 回复 / 无）
    6. **应用列表**：这个任务主要在哪些应用里做的

    还要给整个小时：
    - **一句话总结**（20 字以内，要要关要准）
    - **专注度** 0-1（任务连续不切屏 = 高，频繁切屏 = 低）
    - **生产力** 0-1（有 commit/issue/决策等产出 = 高，纯浏览/聊天 = 低）
    - **模式标签**：主要模式（深度工作/调试为主 / 沟通会议为主 / 碎片为主）

    ⚠️ 必须**仅输出 JSON**，不要任何解释文字、Markdown 代码块标记、引号包裹：
    {
      "summary":"...",
      "mode":"深度工作|调试|沟通|碎片|学习|会议",
      "focus_score":0.0-1.0,
      "productivity_score":0.0-1.0,
      "tasks":[
        {"title":"...","category":"...","start":"HH:MM","end":"HH:MM","details":"...","outcomes":["commit|issue|...|none"],"apps":["app1","app2"]}
      ]
    }

  # 日报汇总 prompt
  prompt_daily: |
    你是高级算法主管的工作日报分析师。下面是他在 {date} 这一天的时报告汇总。

    ⚠️ **重要约束**（务必遵守）：
    1. 时报告数据可能稀疏（0~24 个不等），**只汇总有时报告的时段**，无数据的时段（00:00-23:00 中没列出的）一律不写、不推断、不脑补
    2. 如果全天只有 1-2 个时段有数据，headline 直接说"数据稀疏（仅 N 个时段）"，不要硬凑 24 小时的总结
    3. 时间分配百分比按"有数据的时段"重新归一化（不要硬凑成 100%）
    4. **绝对不要**为缺失时段编造活动、产出、专注度

    请生成一份**有深度、有洞察**的工作日报，包括：

    1. **今日核心**：3-5 句话总结今天最重要的几件事（要看出"项目推进了什么"）
    2. **时间分配**：深度工作、沟通、会议、碎片等各占多少百分比
    3. **工具使用**：主要应用 Top 5 + 占比
    4. **关键产出**：今天写了什么代码、看了什么文档、解决了什么问题
    5. **效率分析**：专注度趋势、碎片程度、心流时间
    6. **明日建议**：基于今天的模式给出 2-3 条可执行建议

    ⚠️ **输出要求**：
    - headline 要**犀利有判断**，不用"工作多类"这种凑数词（例：'被 Linux 截图部署项卡 3 小时，收获 DayScope v1'）
    - core_work 是**今日大事**（不是逐小时描述），需跨小时合并同类任务（例：'项目进展：DayScope 调通 + 推 GitHub'）
    - key_outputs 写**具体产出**（commit hash / issue 编号 / 文档名），不写"问了很多问题"

    时报数据（含各小时任务归纳）：{hourly_summaries}

    输出**严格 JSON**：
    {{
      "headline": "今日一句话（20字内，要犀利有判断）",
      "core_work": ["核心事项 1", "核心事项 2", "核心事项 3"],
      "time_distribution": {{"深度工作": 40, "沟通协作": 20, "会议": 10, "碎片浏览": 15, "学习": 10, "其他": 5}},
      "top_apps": [["VS Code", 60], ["Chrome", 20], ["Slack", 10]],
      "key_outputs": ["产出 1", "产出 2"],
      "focus_score": 0.0,
      "productivity_score": 0.0,
      "highlights": ["高光时刻 1", "高光时刻 2"],
      "lowlights": ["低效时段 1", "低效时段 2"],
      "tomorrow_suggestions": ["建议 1", "建议 2"]
    }}

# ============ 报告输出 ============
reports:
  output_dir: "~/WorkSpace/Document/汇报/日报"
  date_folder_format: "%Y-%m-%d"
  hourly_filename: "时报-{hour:02d}.md"
  daily_filename: "日报.md"

# ============ 日志 ============
logging:
  level: INFO
  file: ~/.dayscope/logs/tracker.log
  max_bytes: 10485760     # 10MB
  backup_count: 5